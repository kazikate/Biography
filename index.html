        :root {
            color-scheme: dark; 
            --dark-bg: #000000; 
            --link-bg: #1F1925; 
            --link-hover: #31283D; 
            --text-light: #DCBAF7; 
            --accent-purple: #9d50ff; 
            --shadow-color: rgba(0, 0, 0, 0.4);
            --image-height-vh: 450px; 
            --transition-start: 60%; 
        }

::selection { background-color: rgba(157, 80, 255, 0.35); }
::-moz-selection { background-color: rgba(157, 80, 255, 0.35); }

body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--dark-bg); 
    color: var(--text-light);
    margin: 0; padding: 0; 
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; position: relative; 
    -webkit-tap-highlight-color: transparent; 
}

        .profile-img-container {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
    width: 100%; height: var(--image-height-vh); z-index: 1; max-width: 600px;
    mask-image: linear-gradient(to bottom, black var(--transition-start), transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black var(--transition-start), transparent 94%);
    transition: opacity 0.8s ease-out; opacity: 0; will-change: transform; cursor: pointer; 
    -webkit-tap-highlight-color: transparent; overflow: hidden; isolation: isolate; 
        }

        .content-wrapper {
            width: 100%; max-width: 600px; margin-top: calc(var(--image-height-vh) * 0.8 - 10px); 
            z-index: 2; position: relative; margin-left: auto; margin-right: auto;
        }

        .container {
            width: 100%; max-width: 600px; padding: 0 20px 40px; text-align: center; box-sizing: border-box; margin: 0 auto;
        }

        .bottom-blur-layer {
            position: fixed; bottom: 0; z-index: 9; pointer-events: none; height: 100px; 
            width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            mask-image: linear-gradient(to top, black 0%, transparent 100%); -webkit-mask-image: linear-gradient(to top, black 0%, transparent 100%);
        }

        .profile-img-container.is-visible { opacity: 1; transition-delay: 0.1s; }

        .profile-img-visual {
            width: 100%; height: 100%; position: relative; 
            background-image: url('https://kazikate.github.io/Biography/assets/Profile2.png'); 
            background-size: cover; background-position: center top; background-repeat: no-repeat;
            filter: blur(0px); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            will-change: filter, transform; 
        }

        body.is-modal-open .profile-img-visual { transform: scale(1.08); }

        .dim-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--dark-bg); 
            opacity: 0; transition: opacity 0.1s linear; will-change: opacity; 
        }

        .username {
            font-family: 'Chillax', sans-serif; font-size: 2.5em; font-weight: 500; margin-top: 0px; 
            text-shadow: 0 0 10px rgba(0,0,0,0.5); transform: translateY(50px); 
            transition: opacity 0.6s ease-out, transform 0.6s ease-out; opacity: 0; max-width: 600px;
        }
        .username.is-visible { opacity: 1; transform: translateY(30px); transition-delay: 0.3s; }

        .bio {
            font-size: 0.97em; font-weight: 550; opacity: 0; margin-top: 5px; margin-bottom: 20px;
            transform: translateY(18px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; max-width: 600px;
        }
        .bio.is-visible { opacity: 0.8; transform: translateY(0); transition-delay: 0.5s; }
        
        .social-icons-mini {
            margin: 15px 0; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; max-width: 600px;
        }
        .social-icons-mini.is-visible { opacity: 1; transform: translateY(0); transition-delay: 0.7s; }

        .link-button {
            display: flex; align-items: center; background-color: var(--link-bg); color: var(--text-light); text-decoration: none;
            padding: 15px 20px; margin: 15px 0; border-radius: 38px; font-weight: 600; font-size: 1em; box-shadow: 0 0px 0px var(--shadow-color); 
            height: 38px; position: relative; opacity: 0; transform: translateY(50px); 
            transition: background-color 0s, box-shadow 0.2s, opacity 0.6s ease-out, transform 0.6s ease-out; -webkit-tap-highlight-color: transparent;
        }
        .link-button.is-visible { opacity: 1; transform: translateY(0); }
        
        .link-button:nth-child(1) { transition-delay: 0.9s; } .link-button:nth-child(2) { transition-delay: 1.0s; }
        .link-button:nth-child(3) { transition-delay: 1.1s; } .link-button:nth-child(4) { transition-delay: 1.2s; }
        .link-button:nth-child(5) { transition-delay: 1.3s; } .link-button:nth-child(6) { transition-delay: 1.4s; }
        .link-button:nth-child(7) { transition-delay: 1.5s; }

        @keyframes press-link { 0% { transform: scale(1) translateZ(0); } 50% { transform: scale(0.98) translateZ(0); } 100% { transform: scale(1) translateZ(0); } }
        .link-button.press { animation: press-link 0.2s ease-out; pointer-events: none; }

        .social-icons-mini a { margin: 0px; display: inline-block; opacity: 1; transition: transform 0.2s, opacity 0.2s; line-height: 0; -webkit-tap-highlight-color: transparent; }
        .social-icons-mini a:hover { opacity: 1; transform: scale(1.1); }
        
        .bio-emoji { width: 1.2em; height: 1.2em; vertical-align: -0.1em; margin: 0.1px; display: inline-block; }
        .link-img-placeholder { transform: translateX(-11px); width: 50px; height: 50px; border-radius: 50%; background-color: #1F1925; margin-right: 0px; background-size: cover; background-position: center; background-repeat: no-repeat; box-shadow: 0 0px 0px rgba(0, 0, 0, 0.2); }
        .link-text-details { flex-grow: 1; text-align: center; position: absolute; left:50%; transform: translateX(-50%); display: flex; flex-direction: column; justify-content: center; min-height: 40px; }
        .link-platform { font-weight: 600; display: block; }
        .link-username { font-size: 0.75em; opacity: 0.6; font-weight: 400; display: block; }
        .footer-links { margin-top: 40px; font-size: 1em; font-weight: 400; margin-bottom: 40px; position: relative; z-index: 10; }
        .footer-links a { color: var(--text-light); opacity: 0.6; text-decoration: none; margin: 0 2px; }
        .footer-links a:hover { opacity: 1; text-decoration: underline; }
        .footer-links .footer-text { display: inline-block; }

        .mini-icon { border-radius: 50%; vertical-align: middle; transform: translateY(-13px); }
        .instagram-mini-icon .mini-icon { width: 47px; height: 47px; transform: translateY(-13px) translateX(16px); }
        .twitter-mini-icon .mini-icon { width: 55px; height: 55px; transform: translateY(-14px) translateX(7px); }
        .threads-mini-icon .mini-icon { width: 49px; height: 49px; transform: translateY(-13px) translateX(-2px); }
        .tiktok-mini-icon .mini-icon { width: 47px; height: 47px; transform: translateY(-13px) translateX(-12px); }
        .spotify-mini-icon .mini-icon { width: 42px; height: 42px; transform: translateY(-13px) translateX(-14px); }
        .youtube-music-mini-icon .mini-icon { width: 45px; height: 45px; transform: translateY(-13px) translateX(-14px); }
        .website-mini-icon .mini-icon { width: 48px; height: 48px; transform: translateY(-13px) translateX(-17px); }

    .no-scroll { overflow: hidden; }

    @media (max-width: 480px) { body { padding: 0; } .container { padding: 0 20px 40px; } }
    @media (min-width: 700px) {
        .profile-img-container, .content-wrapper, .bottom-blur-layer { max-width: 500px; }
        .container { max-width: 800px; padding: 0 0 40px 0; }

        .image-preview-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0); z-index: 1000;
            display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease, background-color 0.3s ease;
        }

        .modal-content { transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #preview-image { width: 100%; height: 100%; object-fit: cover; }   
  
body.animations-done .link-button { transition-delay: 0s !important; }

@media (hover: hover) {
    body.animations-done .link-button:hover { transform: scale(1.05); transition: transform 0.15s ease-out !important; }
    body.animations-done .link-button:not(:hover) { transform: scale(1); transition: transform 0.15s !important; }
}
  
.profile-hover-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; 
}
.profile-hover-layer i { color: #DCBAF7; font-size: 3.5em; transform: scale(0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

.profile-img-container.scrolled-past .profile-hover-layer { opacity: 0 !important; }
.profile-img-container.scrolled-past .profile-hover-layer i { transform: scale(0.5) !important; }
.profile-img-container.show-hint .profile-hover-layer { opacity: 1 !important; }
.profile-img-container.show-hint .profile-hover-layer i { transform: scale(1) !important; }

.social-icons-mini img { pointer-events: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
.downloadable-profile-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 4; pointer-events: auto; -webkit-touch-callout: default !important; }
.profile-img-container.disable-hover .profile-hover-layer { opacity: 0 !important; transition: none !important; }
.profile-img-container.disable-hover .profile-hover-layer i { transform: scale(0.5) !important; transition: none !important; }

::-webkit-scrollbar { width: 5px; }

/* ------------------------------------------------ */
/* DİNAMİK MÜZİK WIDGET'I (ULTIMATE V4) */
/* ------------------------------------------------ */

#music-widget {
    position: fixed; top: 15px; left: 15px; z-index: 100; display: flex; align-items: center; width: 100%;
}

/* ANA KAPAK ÇERÇEVESİ */
.music-cover-container {
    width: 55px; height: 55px; border-radius: 50%; position: relative; z-index: 3; cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid #A48BB8; overflow: hidden;
    background-color: transparent; transition: background-color 0.5s ease;
    -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
}
.music-cover-container.solid-bg { background-color: #120e18; }

.default-glass-cover {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center;
    z-index: 1; transition: opacity 0.4s ease;
}
.default-glass-cover svg { width: 22px; height: 22px; color: #A48BB8; }

.track-cover-layer {
    width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; opacity: 0; 
    transition: opacity 0.6s ease-in-out;
}

.spin-anim { animation: spin-record 5s linear infinite; }
@keyframes spin-record { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.music-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); 
    display: flex; justify-content: center; align-items: center; z-index: 3; opacity: 0; transition: opacity 0.3s ease;
}
.music-cover-container.is-active .music-overlay, .music-cover-container:hover .music-overlay { opacity: 1; }

.music-overlay svg {
    width: 20px; height: 20px; color: #A48BB8; position: absolute; opacity: 0; transform: scale(0.5);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.music-overlay svg.show-icon { opacity: 1; transform: scale(1); }

.music-waves {
    display: flex; align-items: center; justify-content: center; gap: 3px; height: 20px; position: absolute; opacity: 0; transform: scale(0.5);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.music-waves.show-wave { opacity: 1; transform: scale(1); }

.wave-line {
    width: 3px; height: 100%; background-color: #A48BB8; border-radius: 3px; animation: wave-bounce 1s ease-in-out infinite alternate;
}
.wave-line:nth-child(1) { animation-delay: 0.0s; }
.wave-line:nth-child(2) { animation-delay: 0.3s; height: 60%; }
.wave-line:nth-child(3) { animation-delay: 0.6s; height: 80%; }
.wave-line:nth-child(4) { animation-delay: 0.9s; height: 50%; }
@keyframes wave-bounce { 0% { height: 20%; opacity: 0.5; } 100% { height: 100%; opacity: 1; } }

/* ŞARKI İSMİ HAPI (ÜSTTE ÇIKAN) */
.music-pill {
    position: absolute; left: 27px; height: 45px; background: rgba(20, 15, 25, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid #A48BB8; border-radius: 0 25px 25px 0; z-index: 1; display: flex; align-items: center;
    max-width: 0; padding: 0; overflow: hidden; white-space: nowrap; opacity: 0;
    transition: max-width 0.5s cubic-bezier(0.5, 0, 0.1, 1), padding 0.5s cubic-bezier(0.5, 0, 0.1, 1), opacity 0s 0.5s; 
}
.music-pill.show-pill { 
    max-width: 200px; padding: 0 20px 0 35px; opacity: 1; z-index: 2;
    transition: max-width 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55), padding 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.1s ease;
}

/* YENİ: ÖNCEKİ ŞARKI BUTONU (KAPAĞIN ALTINA DÜŞER) */
.prev-btn {
    position: absolute; left: 10px; top: 10px; width: 35px; height: 35px; background: rgba(20, 15, 25, 0.8);
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid #A48BB8; border-radius: 50%;
    display: flex; justify-content: center; align-items: center; z-index: 1; opacity: 0; transform: translateY(0) scale(0.5);
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); cursor: pointer;
}
.prev-btn.show-prev { opacity: 1; transform: translateY(60px) scale(1); z-index: 2; }
.prev-btn svg { width: 16px; height: 16px; color: #A48BB8; }

/* YENİ: SEEKBAR HAPI (KUSURSUZ İÇİNDEN ÇIKMA VE UZAMA) */
.seek-pill {
    position: absolute; left: 27px; top: 5px; height: 45px; background: rgba(20, 15, 25, 0.85);
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid #A48BB8; border-radius: 0 25px 25px 0;
    z-index: 0; display: flex; align-items: center; max-width: 0; padding: 0; overflow: hidden; white-space: nowrap; opacity: 0;
    transition: max-width 0.5s cubic-bezier(0.5, 0, 0.1, 1), padding 0.5s cubic-bezier(0.5, 0, 0.1, 1), opacity 0.2s ease; 
}
.seek-pill.show-seek {
    max-width: 75vw; /* %75 UZUNLUK */
    width: 75vw;
    padding: 0 20px 0 45px; /* Kapağın arkasından kurtulması için sol boşluk */
    opacity: 1; z-index: 2; 
    transition: max-width 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), padding 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.1s ease;
}

/* ZAMAN SAYACILARI */
.time-display {
    font-size: 0.75rem; color: #DCBAF7; font-weight: 600; font-family: 'Poppins', sans-serif; opacity: 0.9;
}

/* SENKRONİZE EDİLMİŞ DİNAMİK DOLGULU RANGE */
#seek-bar {
    -webkit-appearance: none; flex-grow: 1; margin: 0 10px; height: 5px; border-radius: 3px; outline: none;
    background: linear-gradient(to right, #DCBAF7 0%, rgba(164, 139, 184, 0.3) 0%); /* Dinamik Arka Plan */
}
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #ffffff; cursor: pointer;
    box-shadow: 0 0 8px rgba(220, 186, 247, 0.8); transition: transform 0.2s;
}
#seek-bar::-webkit-slider-thumb:active { transform: scale(1.3); }

.cover-bounce { animation: hit-bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes hit-bounce { 0% { transform: scale(1); } 40% { transform: scale(1.05); } 100% { transform: scale(1); } }

.music-info { display: flex; flex-direction: column; justify-content: center; transition: opacity 0.3s ease; }
.music-info.fade-out { opacity: 0; }
#track-title { color: white; font-size: 0.85rem; font-weight: 600; }
#track-artist { color: rgba(255, 255, 255, 0.6); font-size: 0.7rem; }
.pause-anim { animation-play-state: paused !important; }

#forward-icon {
    width: 20px; height: 20px; color: #A48BB8; position: absolute; opacity: 0; transform: translateX(-15px) scale(0.5); 
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
#forward-icon.show-forward { opacity: 1; transform: translateX(0) scale(1); }

    </style>
</head>

    const SPRING_TRANSITION = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

        const parallaxRatio = 0.4; const maxScroll = 200; const maxBlur = 10; const maxDimOpacity = 0.6;  
        let ticking = false;

        function updateEffects() {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const bodyTop = document.body.getBoundingClientRect().top;
                    const scrollY = Math.max(0, -bodyTop); 
                    const clampedScroll = Math.min(scrollY, maxScroll);
                    const scrollRatio = clampedScroll / maxScroll; 
                    const newY = scrollY * parallaxRatio; 
                    
                    profileImgContainer.style.transform = `translate3d(-50%, ${newY}px, 0)`; 
                    profileImgVisual.style.filter = `blur(${scrollRatio * maxBlur}px)`;
                    dimOverlay.style.opacity = scrollRatio * maxDimOpacity;

                    if (scrollY > 30) { profileImgContainer.classList.add('scrolled-past'); } 
                    else { profileImgContainer.classList.remove('scrolled-past'); }
                    ticking = false;
                });
                ticking = true;
            }
        }

        window.addEventListener('scroll', updateEffects, { passive: true });
        window.addEventListener('touchmove', updateEffects, { passive: true });
        updateEffects();

        const modalContent = document.querySelector('.modal-content'); 
        let initialDistance = 0; let currentScale = 1; let isPinching = false; const MIN_TOUCHES_FOR_PINCH = 2;

        function closeModal() {
            if (!modal.classList.contains('is-open')) return;
            modal.classList.remove('is-open'); document.removeEventListener('keydown', handleEscape);
            document.body.classList.remove('no-scroll'); document.body.classList.remove('is-modal-open'); 
            modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(0)`; 
            currentScale = 1; isPinching = false;
            
            if (history.state && history.state.modal === MODAL_STATE_NAME) {
                 if (history.length > 0) { history.back(); }
            }
        }
        
        function openModal() {
            if (modal.classList.contains('is-open')) return;
            if (!history.state || history.state.modal !== MODAL_STATE_NAME) { history.pushState({ modal: MODAL_STATE_NAME }, '', window.location.href); }
            document.body.classList.add('no-scroll'); document.body.classList.add('is-modal-open'); 
            modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(0)`; 
            modal.classList.add('is-open'); setTimeout(() => { modalContent.style.transform = `scale(1)`; }, 10);
            modal.addEventListener('click', (event) => { if (event.target.id === 'image-preview-modal') { closeModal(); } }, { once: true }); 
            document.addEventListener('keydown', handleEscape, { once: true });
        }

        function handleEscape(e) { if (e.key === 'Escape') closeModal(); }
        
        window.addEventListener('popstate', (e) => {
            if (modal.classList.contains('is-open') && (!e.state || e.state.modal !== MODAL_STATE_NAME)) {
                modal.classList.remove('is-open'); document.body.classList.remove('no-scroll'); document.body.classList.remove('is-modal-open'); 
                modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(0)`;
            }
        });

        profileImgContainer.addEventListener('click', openModal);
        
        modal.addEventListener('touchstart', (e) => {
            if (e.touches.length === MIN_TOUCHES_FOR_PINCH) {
                e.preventDefault(); modalContent.style.transition = 'none'; 
                initialDistance = getDistance(e.touches); isPinching = true;
            } else { isPinching = false; }
        }, { passive: false }); 

        modal.addEventListener('touchmove', (e) => {
            if (!isPinching) return; e.preventDefault(); 
            const newDistance = getDistance(e.touches); const scaleFactor = newDistance / initialDistance;
            currentScale = Math.min(Math.max(scaleFactor, 0.5), 4.0); modalContent.style.transform = `scale(${currentScale})`;
        }, { passive: false }); 

        modal.addEventListener('touchend', (e) => {
            if (!isPinching) return; isPinching = false; 
            modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(1)`; currentScale = 1;
        });
        
        function getDistance(touches) { return Math.sqrt(Math.pow(touches[1].clientX - touches[0].clientX, 2) + Math.pow(touches[1].clientY - touches[0].clientY, 2)); }
    });

        document.addEventListener('touchstart', () => { document.body.classList.add('is-touching'); }, { passive: true });

                    icon.style.transform = `translate(${x * 0.4}px, ${y * 0.4}px) scale(1.15)`; icon.style.transition = 'transform 0.1s ease-out';

        const canvas = document.getElementById('particle-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d'); let width, height; let particles = []; let tiltX = 0; let tiltY = 0;
            function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas); resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 2.0 + 1.0; 
                    this.speedX = Math.random() * 0.5 - 0.2; this.speedY = Math.random() * -0.5 - 0.2; this.opacity = Math.random() * 0.35 + 0.15; 
                }
                update() {
                    const depth = this.size * 0.4; this.x += this.speedX + (tiltX * 0.02 * depth); this.y += this.speedY + (tiltY * 0.02 * depth);
                    if (this.y < -10) this.y = height + 10; if (this.x < -10) this.x = width + 10;
                    if (this.x > width + 10) this.x = -10; if (this.y > height + 10) this.y = -10;
                }
                draw() { ctx.fillStyle = `rgba(157, 80, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            }

            for (let i = 0; i < 45; i++) { particles.push(new Particle()); }
            function animateParticles() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }

            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

            { title: "[sic]", artist: "Slipknot", file: "music/[sic].opus", customCover: "https://i.scdn.co/image/ab67616d0000b27310dfb0b9dbf8da6db290e2fe" },
            { title: "Eyeless", artist: "Slipknot", file: "music/Eyeless.opus", customCover: "https://i.scdn.co/image/ab67616d0000b27310dfb0b9dbf8da6db290e2fe" },
            { title: "Unsainted", artist: "Slipknot", file: "music/Unsainted.opus", customCover: "https://i.scdn.co/image/ab67616d0000b2731998f8cc4259b95dfc0bfb27" },

            { title: "Dying in Your Arms", artist: "Deathly Hours", file: "music/Dying in Your Arms.opus" }
        ];

        async function loadRandomTrack() {
            toggleBtn.classList.add('solid-bg'); trackLoadTicket++; const myTicket = trackLoadTicket;

            if (shuffledQueue.length === 0 || currentQueueIndex >= shuffledQueue.length) {
                shuffledQueue = Array.from({length: playlist.length}, (_, i) => i);
                for (let i = shuffledQueue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledQueue[i], shuffledQueue[j]] = [shuffledQueue[j], shuffledQueue[i]];
                }
                currentQueueIndex = 0;
            }

            const trackIndex = shuffledQueue[currentQueueIndex]; currentQueueIndex++; const randomTrack = playlist[trackIndex];
            trackTitle.textContent = randomTrack.title; trackArtist.textContent = randomTrack.artist; audioPlayer.src = randomTrack.file; 
            
            const nextCover = activeCover === 1 ? trackCover2 : trackCover1; const currentCover = activeCover === 1 ? trackCover1 : trackCover2;
            let finalCoverUrl = "https://i.scdn.co/image/ab67616d0000b27341e97ee9cf2ee378519e4875"; 

            if (randomTrack.customCover) { finalCoverUrl = randomTrack.customCover; } 
            else {
                try {
                    const response = await fetch(`https://itunes.apple.com/search?term=${randomTrack.artist}+${randomTrack.title}&entity=song&limit=1`);
                    const data = await response.json(); if(data.results.length > 0) { finalCoverUrl = data.results[0].artworkUrl100.replace('100x100bb', '600x600bb'); }
                } catch(e) { console.log("Kapak çekilemedi."); }
            }

            if (myTicket !== trackLoadTicket) return;

            nextCover.onload = () => {
                if (myTicket !== trackLoadTicket) return; 
                nextCover.style.opacity = '1'; currentCover.style.opacity = '0'; defaultCover.style.opacity = '0'; activeCover = activeCover === 1 ? 2 : 1; 
            };

            if (nextCover.src === finalCoverUrl) { nextCover.onload(); } else { nextCover.src = finalCoverUrl; }
        }

        function resetIcons() { playIcon.classList.remove('show-icon'); pauseIcon.classList.remove('show-icon'); waveIcon.classList.remove('show-wave'); }

        function playTrack(isSkipping = false) {
            clearTimeout(iconTimeout); resetIcons(); audioPlayer.play().catch(e => console.log("Müzik bekleniyor..."));
            trackCover1.classList.add('spin-anim'); trackCover1.classList.remove('pause-anim'); trackCover2.classList.add('spin-anim'); trackCover2.classList.remove('pause-anim'); 
            toggleBtn.classList.add('is-active');
            
            if (isSkipping) { iconTimeout = setTimeout(() => { waveIcon.classList.add('show-wave'); }, 400); } 
            else { playIcon.classList.add('show-icon'); iconTimeout = setTimeout(() => { playIcon.classList.remove('show-icon'); waveIcon.classList.add('show-wave'); }, 1000); }
            isPlaying = true;
        }

        function pauseTrack() {
            clearTimeout(iconTimeout); audioPlayer.pause();
            trackCover1.classList.add('pause-anim'); trackCover2.classList.add('pause-anim'); 
            toggleBtn.classList.remove('is-active'); waveIcon.classList.remove('show-wave'); pauseIcon.classList.add('show-icon'); isPlaying = false;
        }

        toggleBtn.addEventListener('click', (e) => {
            if (isLongPress) { isLongPress = false; return; }
            if (e.detail === 1) { 
                clickTimer = setTimeout(() => {
                    if (isFirstPlay) { loadRandomTrack(); showPill(); isFirstPlay = false; playTrack(); } 
                    else { isPlaying ? pauseTrack() : playTrack(); }
                }, 250); 
            }
        });

        toggleBtn.addEventListener('dblclick', () => {
            clearTimeout(clickTimer); resetIcons(); 
            const forwardIcon = document.getElementById('forward-icon'); forwardIcon.classList.add('show-forward');
            if (musicPill.classList.contains('show-pill')) { clearTimeout(pillTimeout); closePill(); }
            setTimeout(() => { forwardIcon.classList.remove('show-forward'); loadRandomTrack(); isFirstPlay = false; showPill(); playTrack(true); }, 500); 
        });

        audioPlayer.addEventListener('ended', () => {
            isPlaying = false; trackCover1.classList.remove('spin-anim'); trackCover2.classList.remove('spin-anim');
            resetIcons(); playIcon.classList.add('show-icon');
        });

</script>
