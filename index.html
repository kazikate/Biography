    <style>
        @import url('https://api.fontshare.com/css?f[]=chillax@300,400,500,600,700&display=swap');

        /* DPI DUYARLI YÜKSEKLİK VE RENK DEĞİŞKENLERİ */
        :root { 
            color-scheme: dark; 
            --dark-bg: #000000; 
            --link-bg: #1F1925; 
            --link-hover: #31283D; 
            --text-light: #DCBAF7; 
            --accent-purple: #9d50ff; 
            --lyric-accent: #DCBAF7; 
            --shadow-color: rgba(0, 0, 0, 0.4); 
            --image-height-vh: 50vh; 
            --transition-start: 60%; 
        }



        body { 
            font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: var(--text-light); 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; position: relative; -webkit-tap-highlight-color: transparent; 
            
            /* Varsayılan Renkler */
            --ui-accent: #A48BB8; 
            --ui-light: #DCBAF7; 
            transition: background-color 0.5s ease, color 0.5s ease, --ui-accent 0.8s ease, --ui-light 0.8s ease;
        }

        /* LİRİK AÇILDIĞINDA DEVREYE GİRECEK TEMA */
        body.theme-lyric-on { 
            --ui-accent: var(--lyric-accent); 
            --ui-light: var(--lyric-accent); 
        }

        ::selection { background-color: rgba(157, 80, 255, 0.35); } ::-moz-selection { background-color: rgba(157, 80, 255, 0.35); }

        .profile-img-container { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: var(--image-height-vh); z-index: 1; max-width: 600px; mask-image: linear-gradient(to bottom, black var(--transition-start), transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black var(--transition-start), transparent 94%); transition: opacity 0.8s ease-out; opacity: 0; will-change: transform; cursor: pointer; -webkit-tap-highlight-color: transparent; overflow: hidden; isolation: isolate; }
        .content-wrapper { width: 100%; max-width: 600px; margin-top: calc(var(--image-height-vh) * 0.8 - 10px); z-index: 2; position: relative; margin-left: auto; margin-right: auto; }
        .container { width: 100%; max-width: 600px; padding: 0 20px 40px; text-align: center; box-sizing: border-box; margin: 0 auto; }
        .bottom-blur-layer { position: fixed; bottom: 0; z-index: 9; pointer-events: none; height: 100px; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); mask-image: linear-gradient(to top, black 0%, transparent 100%); -webkit-mask-image: linear-gradient(to top, black 0%, transparent 100%); }
        .profile-img-container.is-visible { opacity: 1; transition-delay: 0.1s; }
        
        .profile-img-visual { width: 100%; height: 100%; position: relative; background-image: url('https://kazikate.github.io/Biography/assets/Profile2.png'); background-size: cover; background-position: center top; background-repeat: no-repeat; filter: blur(0px); transition: background-image 0.5s ease, filter 0.5s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; will-change: filter, transform; }
        
        body.is-modal-open .profile-img-visual { transform: scale(1.08); }
        .dim-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--dark-bg); opacity: 0; transition: opacity 0.1s linear; will-change: opacity; }
        .username { font-family: 'Chillax', sans-serif; font-size: 2.5em; font-weight: 500; margin-top: 0px; text-shadow: 0 0 10px rgba(0,0,0,0.5); transform: translateY(50px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; opacity: 0; max-width: 600px; }
        .username.is-visible { opacity: 1; transform: translateY(30px); transition-delay: 0.3s; }
        .bio { font-size: 0.97em; font-weight: 550; opacity: 0; margin-top: 5px; margin-bottom: 20px; transform: translateY(18px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; max-width: 600px; }
        .bio.is-visible { opacity: 0.8; transform: translateY(0); transition-delay: 0.5s; }
        .social-icons-mini { margin: 15px 0; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; max-width: 600px; }
        .social-icons-mini.is-visible { opacity: 1; transform: translateY(0); transition-delay: 0.7s; }
        .link-button { display: flex; align-items: center; background-color: var(--link-bg); color: var(--text-light); text-decoration: none; padding: 15px 20px; margin: 15px 0; border-radius: 38px; font-weight: 600; font-size: 1em; box-shadow: 0 0px 0px var(--shadow-color); height: 38px; position: relative; opacity: 0; transform: translateY(50px); transition: background-color 0s, box-shadow 0.2s, opacity 0.6s ease-out, transform 0.6s ease-out; -webkit-tap-highlight-color: transparent; }
        .link-button.is-visible { opacity: 1; transform: translateY(0); }
        .link-button:nth-child(1) { transition-delay: 0.9s; } .link-button:nth-child(2) { transition-delay: 1.0s; } .link-button:nth-child(3) { transition-delay: 1.1s; } .link-button:nth-child(4) { transition-delay: 1.2s; } .link-button:nth-child(5) { transition-delay: 1.3s; } .link-button:nth-child(6) { transition-delay: 1.4s; } .link-button:nth-child(7) { transition-delay: 1.5s; }
        @keyframes press-link { 0% { transform: scale(1) translateZ(0); } 50% { transform: scale(0.98) translateZ(0); } 100% { transform: scale(1) translateZ(0); } }
        .link-button.press { animation: press-link 0.2s ease-out; pointer-events: none; }
        .social-icons-mini a { margin: 0px; display: inline-block; opacity: 1; transition: transform 0.2s, opacity 0.2s; line-height: 0; -webkit-tap-highlight-color: transparent; }
        .social-icons-mini a:hover { opacity: 1; transform: scale(1.1); }
        .bio-emoji { width: 1.2em; height: 1.2em; vertical-align: -0.1em; margin: 0.1px; display: inline-block; }
        .link-img-placeholder { transform: translateX(-11px); width: 50px; height: 50px; border-radius: 50%; background-color: #1F1925; margin-right: 0px; background-size: cover; background-position: center; background-repeat: no-repeat; box-shadow: 0 0px 0px rgba(0, 0, 0, 0.2); }
        .link-text-details { flex-grow: 1; text-align: center; position: absolute; left:50%; transform: translateX(-50%); display: flex; flex-direction: column; justify-content: center; min-height: 40px; }
        .link-platform { font-weight: 600; display: block; }
        .link-username { font-size: 0.75em; opacity: 0.6; font-weight: 400; display: block; }
        .footer-links { margin-top: 40px; font-size: 1em; font-weight: 400; margin-bottom: 0px; position: relative; z-index: 10; }
        .footer-links a { color: var(--text-light); opacity: 0.6; text-decoration: none; margin: 0 2px; }
        .footer-links a:hover { opacity: 1; text-decoration: underline; }
        .footer-links .footer-text { display: inline-block; }
        .mini-icon { border-radius: 50%; vertical-align: middle; transform: translateY(-13px); }
        .instagram-mini-icon .mini-icon { width: 47px; height: 47px; transform: translateY(-13px) translateX(16px); }
        .twitter-mini-icon .mini-icon { width: 55px; height: 55px; transform: translateY(-14px) translateX(7px); }
        .threads-mini-icon .mini-icon { width: 49px; height: 49px; transform: translateY(-13px) translateX(-2px); }
        .tiktok-mini-icon .mini-icon { width: 47px; height: 47px; transform: translateY(-13px) translateX(-12px); }
        .spotify-mini-icon .mini-icon { width: 42px; height: 42px; transform: translateY(-13px) translateX(-14px); }
        .youtube-music-mini-icon .mini-icon { width: 45px; height: 45px; transform: translateY(-13px) translateX(-14px); }
        .website-mini-icon .mini-icon { width: 48px; height: 48px; transform: translateY(-13px) translateX(-17px); }

        .no-scroll { overflow: hidden; }
        @media (max-width: 480px) { body { padding: 0; } .container { padding: 0 20px 40px; } }
        @media (min-width: 700px) { .profile-img-container, .content-wrapper, .bottom-blur-layer { max-width: 500px; } .container { max-width: 800px; padding: 0 0 40px 0; } }

        .image-preview-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease, background-color 0.3s ease; }
        .image-preview-modal.is-open { opacity: 1; background-color: rgba(0, 0, 0, 0.85); pointer-events: auto; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); background-color: rgba(0, 0, 0, 0.7); }
        .modal-content { transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .modal-circle-mask { 
            width: 85vw; height: 85vw; 
            max-width: 400px; max-height: 400px; 
            border-radius: 50%; overflow: hidden; 
            box-shadow: 0 0 40px rgba(157, 80, 255, 0.4); 
            position: relative; margin: 0 auto; 
        }
        #preview-image { 
            width: 100%; height: 100%; 
            object-fit: cover; display: block; 
            position: absolute; top: 0; left: 0; 
        }   

        body.animations-done .link-button { transition-delay: 0s !important; }
        @media (hover: hover) { body.animations-done .link-button:hover { transform: scale(1.05); transition: transform 0.15s ease-out !important; } body.animations-done .link-button:not(:hover) { transform: scale(1); transition: transform 0.15s !important; } }
        .profile-hover-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .profile-hover-layer i { color: var(--ui-light); font-size: 3.5em; transform: scale(0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .profile-img-container.scrolled-past .profile-hover-layer { opacity: 0 !important; } .profile-img-container.scrolled-past .profile-hover-layer i { transform: scale(0.5) !important; } .profile-img-container.show-hint .profile-hover-layer { opacity: 1 !important; } .profile-img-container.show-hint .profile-hover-layer i { transform: scale(1) !important; }
        .social-icons-mini img { pointer-events: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .downloadable-profile-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: 4; pointer-events: auto; -webkit-touch-callout: default !important; }
        .profile-img-container.disable-hover .profile-hover-layer { opacity: 0 !important; transition: none !important; } .profile-img-container.disable-hover .profile-hover-layer i { transform: scale(0.5) !important; transition: none !important; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background-color: var(--dark-bg); } ::-webkit-scrollbar-thumb { background-color: rgba(157, 80, 255, 0.4); border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background-color: rgba(157, 80, 255, 0.8); }

        /* ------------------------------------------------ */
        /* DİNAMİK MÜZİK WIDGET'I                           */
        /* ------------------------------------------------ */

        #music-widget { position: fixed; top: 15px; left: 15px; z-index: 100; display: flex; align-items: center; width: 100%; }

        .music-cover-container {
            width: 55px; height: 55px; border-radius: 50%; position: relative; z-index: 4; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid var(--ui-accent); overflow: hidden;
            background-color: transparent; transition: background-color 0.5s ease, border-color 0.8s ease;
            touch-action: none;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        .music-cover-container.solid-bg { background-color: #120e18; }
        .default-glass-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1; transition: opacity 0.4s ease; }
        .default-glass-cover svg { width: 22px; height: 22px; color: var(--ui-accent); transition: color 0.8s ease; }
        .track-cover-layer { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; opacity: 0; transition: opacity 0.6s ease-in-out; }
        .spin-anim { animation: spin-record 5s linear infinite; }
        @keyframes spin-record { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .music-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; z-index: 3; opacity: 0; transition: opacity 0.3s ease; }
        .music-cover-container.is-active .music-overlay { opacity: 1; }

        .music-overlay svg { 
            width: 20px; height: 20px; color: var(--ui-accent); position: absolute; 
            opacity: 0; transform: scale(0.5); 
            transition: opacity 0.15s ease-out, transform 0.15s ease-out, color 0.8s ease; 
            pointer-events: none; 
        }
        .music-overlay svg.show-icon { 
            opacity: 1; transform: scale(1); 
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.8s ease; 
        }
        
        .music-waves { 
            display: flex; align-items: center; justify-content: center; gap: 3px; height: 20px; position: absolute; 
            opacity: 0; transform: scale(0.5); 
            transition: opacity 0.15s ease-out, transform 0.15s ease-out; 
            pointer-events: none; 
        }
        .music-waves.show-wave { 
            opacity: 1; transform: scale(1); 
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        #forward-icon { 
            transform: translateX(-15px) scale(0.5); 
            transition: opacity 0.15s ease-out, transform 0.15s ease-out, color 0.8s ease; 
        }
        #forward-icon.show-forward { 
            opacity: 1; transform: translateX(0) scale(1); 
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.8s ease; 
        }

        .wave-line { width: 3px; height: 100%; background-color: var(--ui-accent); border-radius: 3px; animation: wave-bounce 1s ease-in-out infinite alternate; transition: background-color 0.8s ease; }
        .wave-line:nth-child(1) { animation-delay: 0.0s; } .wave-line:nth-child(2) { animation-delay: 0.3s; height: 60%; } .wave-line:nth-child(3) { animation-delay: 0.6s; height: 80%; } .wave-line:nth-child(4) { animation-delay: 0.9s; height: 50%; }
        @keyframes wave-bounce { 0% { height: 20%; opacity: 0.5; } 100% { height: 100%; opacity: 1; } }

        .music-pill {
            position: absolute; left: 27px; top: 6px; height: 45px; background: rgba(20, 15, 25, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--ui-accent); border-radius: 0 25px 25px 0; z-index: 3; display: flex; align-items: center; max-width: 0; padding: 0; overflow: hidden; white-space: nowrap; opacity: 0;
            transition: max-width 0.5s cubic-bezier(0.5, 0, 0.1, 1), padding 0.5s cubic-bezier(0.5, 0, 0.1, 1), opacity 0s 0.5s, border-color 0.8s ease; 
        }
        .music-pill.show-pill { 
            max-width: 250px; padding: 0 20px 0 35px; opacity: 1; 
            transition: max-width 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55), padding 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.1s ease, border-color 0.8s ease;
        }

        .seek-pill {
            position: absolute; left: 27px; top: 7px; height: 45px; 
            background: rgba(20, 15, 25, 0.6); box-sizing: border-box; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--ui-accent); border-radius: 0 25px 25px 0; z-index: 1; display: flex; align-items: center; overflow: hidden; white-space: nowrap; opacity: 0;
            width: 100vw; max-width: 0; padding: 0; 
            transition: max-width 0.5s cubic-bezier(0.5, 0, 0.1, 1), padding 0.5s cubic-bezier(0.5, 0, 0.1, 1), opacity 0s 0.5s, border-color 0.8s ease; 
        }
        .seek-pill.show-seek {
            max-width: min(calc(85vw - 75px), 380px); 
            padding: 0 15px 0 40px; opacity: 1; z-index: 2; 
            transition: max-width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), padding 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.1s ease, border-color 0.8s ease;
        }

        /* TATLI TIKLAMA (SQUISH) EFEKTLERİ */
        .prev-btn {
            position: absolute; left: 10px; top: 10px; width: 35px; height: 35px; 
            background: rgba(20, 15, 25, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--ui-accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; opacity: 0; transform: translateY(0) scale(0.5); 
            z-index: 3; cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.5, 0, 0.1, 1) 0.1s, opacity 0s 0.6s, scale 0.2s ease, border-color 0.8s ease; 
        }
        .prev-btn.show-prev { 
            opacity: 1; transform: translateY(60px) scale(1); 
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0s, opacity 0.1s ease, scale 0.2s ease, border-color 0.8s ease; 
        }

        .lyric-btn {
            position: absolute; left: 10px; top: 10px; width: 35px; height: 35px; 
            background: rgba(20, 15, 25, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--ui-accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer;
            transform: translateY(60px) translateX(0) scale(0.5); opacity: 0; z-index: 1;
            transition: transform 0.4s cubic-bezier(0.5, 0, 0.1, 1) 0s, opacity 0.2s 0.2s, background-color 0.3s, scale 0.2s ease, border-color 0.8s ease;
        }
        .lyric-btn.show-prev { 
            transform: translateY(60px) translateX(45px) scale(1); opacity: 1; z-index: 2; 
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.15s, opacity 0.1s 0.15s, scale 0.2s ease, border-color 0.8s ease; 
        }
        
        .lyric-btn:active, .prev-btn:active {
            scale: 0.85;
            transition: scale 0.1s ease-out !important;
        }

        /* YENİ LİRİK İKONU GEÇİŞLERİ */
        .lyric-btn svg { 
            position: absolute; width: 16px; height: 16px; color: var(--ui-accent); 
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.8s ease; 
        }
        .lyric-icon-open { opacity: 1; transform: scale(1) rotate(0deg); }
        .lyric-icon-close { opacity: 0; transform: scale(0.5) rotate(-45deg); pointer-events: none; }
        
        .lyric-btn.is-active .lyric-icon-open { opacity: 0; transform: scale(0.5) rotate(45deg); pointer-events: none; }
        .lyric-btn.is-active .lyric-icon-close { opacity: 1; transform: scale(1) rotate(0deg); } 
        
        .prev-btn svg { width: 16px; height: 16px; color: var(--ui-accent); transition: color 0.8s ease; }

        /* SOFT BOUNCE VE GÜVENLİ ALAN GÜNCELLEMELERİ */
        .lyrics-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 6; overflow: hidden; pointer-events: none; opacity: 0; 
            transform: translateY(60px); 
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.25, 1.5, 0.5, 1);
            mask-image: linear-gradient(to bottom, transparent 15%, black 35%, black 65%, transparent 85%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 15%, black 35%, black 65%, transparent 85%);
        }
        .lyrics-container.show-lyrics { 
            opacity: 1; 
            transform: translateY(0); 
            pointer-events: auto; 
        }
        
        .lyrics-wrapper { 
            position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; 
            padding-top: 220px; padding-bottom: 220px; 
            padding-left: 15%; padding-right: 15%; 
            text-align: center; 
            word-wrap: break-word; overflow-wrap: break-word; 
            transition: transform 0.6s cubic-bezier(0.25, 1.5, 0.5, 1);
        }
        
        .lyric-line {
            min-height: 35px; line-height: 1.4; font-size: 1.15rem; font-weight: 700;
            color: rgba(255,255,255,0); margin: 15px 0;
            transition: color 0.4s, transform 0.6s cubic-bezier(0.25, 1.5, 0.5, 1), filter 0.4s, opacity 0.4s;
        }
        .lyric-line.active { opacity: 1; transform: scale(1.2) translateY(0); filter: blur(0px); color: var(--lyric-accent); text-shadow: 0 0 15px var(--lyric-accent); }
        .lyric-line.prev { opacity: 0.4; transform: scale(0.9) translateY(-10px); filter: blur(1px); color: #FFF; }
        .lyric-line.next { opacity: 0.4; transform: scale(0.9) translateY(10px); filter: blur(1px); color: #FFF; }

        .lyric-dot { display: inline-block; width: 6px; height: 6px; background: currentColor; border-radius: 50%; margin: 0 5px; animation: bounce-dot 0.6s infinite alternate; }
        .lyric-dot:nth-child(2) { animation-delay: 0.2s; }
        .lyric-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce-dot { 0% { transform: translateY(0); opacity: 0.3; } 100% { transform: translateY(-8px); opacity: 1; box-shadow: 0 0 10px currentColor; } }

        .time-display { font-size: 0.75rem; color: var(--ui-light); font-weight: 600; font-family: 'Poppins', sans-serif; opacity: 0.9; width: 42px; text-align: center; font-variant-numeric: tabular-nums; flex-shrink: 0; display: inline-block; transition: color 0.8s ease; }
               #seek-bar { 
            -webkit-appearance: none; flex-grow: 1; margin: 0 10px;

<script>
    const profileImgContainer = document.querySelector('.profile-img-container'); 
    const profileImgVisual = document.querySelector('.profile-img-visual'); 
    const dimOverlay = document.querySelector('.dim-overlay');
    const downloadableImg = document.querySelector('.downloadable-profile-img');

    const SPRING_TRANSITION = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
    const MODAL_STATE_NAME = 'image_preview_open';

    document.addEventListener('DOMContentLoaded', () => {
        const elementsToAnimate = [profileImgContainer, document.querySelector('.username'), document.querySelector('.bio'), document.querySelector('.social-icons-mini'), ...document.querySelectorAll('.link-button')].filter(el => el != null); 
        setTimeout(() => { elementsToAnimate.forEach(el => { el.classList.add('is-visible'); }); }, 50); 
        
        const parallaxRatio = 0.4; const maxScroll = 200; const maxBlur = 10; const maxDimOpacity = 0.6;  let ticking = false;

        function updateEffects() {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const scrollY = Math.max(0, -document.body.getBoundingClientRect().top); 
                    
                    if (isLyricsMode) {
                        if (scrollY > 150) toggleLyrics(); 
                        profileImgContainer.style.transform = `translate3d(-50%, ${scrollY * parallaxRatio}px, 0)`; 
                        ticking = false;
                        return; 
                    }

                    const scrollRatio = Math.min(scrollY, maxScroll) / maxScroll; 
                    profileImgContainer.style.transform = `translate3d(-50%, ${scrollY * parallaxRatio}px, 0)`; 
                    profileImgVisual.style.filter = `blur(${scrollRatio * maxBlur}px)`; 
                    dimOverlay.style.opacity = scrollRatio * maxDimOpacity;
                    if (scrollY > 30) { profileImgContainer.classList.add('scrolled-past'); } else { profileImgContainer.classList.remove('scrolled-past'); }
                    ticking = false;
                }); ticking = true;
            }
        }
        window.addEventListener('scroll', updateEffects, { passive: true }); window.addEventListener('touchmove', updateEffects, { passive: true }); updateEffects();

        const linkButtons = document.querySelectorAll('.link-button');
        linkButtons.forEach(btn => { btn.addEventListener('click', () => { btn.classList.remove('press'); void btn.offsetWidth; btn.classList.add('press'); setTimeout(() => { btn.classList.remove('press'); }, 200); }); });

        setTimeout(() => {
            document.body.classList.add('animations-done');
            if (profileImgContainer) { setTimeout(() => { profileImgContainer.classList.add('show-hint'); setTimeout(() => { profileImgContainer.classList.remove('show-hint'); }, 1000); }, 300); }
        }, 2200);

        const modal = document.getElementById('image-preview-modal'); const modalContent = document.querySelector('.modal-content'); 
        let initialDistance = 0; let currentScale = 1; let isPinching = false; const MIN_TOUCHES_FOR_PINCH = 2;

        function closeModal() {
            if (!modal.classList.contains('is-open')) return;
            modal.classList.remove('is-open'); document.removeEventListener('keydown', handleEscape);
            document.body.classList.remove('no-scroll'); document.body.classList.remove('is-modal-open'); 
            modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(0)`; 
            currentScale = 1; isPinching = false;
            if (history.state && history.state.modal === MODAL_STATE_NAME) { if (history.length > 0) { history.back(); } }
        }
        function openModal() {
            if (isLyricsMode) return; 
            if (modal.classList.contains('is-open')) return;
            if (!history.state || history.state.modal !== MODAL_STATE_NAME) { history.pushState({ modal: MODAL_STATE_NAME }, '', window.location.href); }
            document.body.classList.add('no-scroll'); document.body.classList.add('is-modal-open'); 
            modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(0)`; 
            modal.classList.add('is-open'); setTimeout(() => { modalContent.style.transform = `scale(1)`; }, 10);
            modal.addEventListener('click', (event) => { if (event.target.id === 'image-preview-modal') { closeModal(); } }, { once: true }); document.addEventListener('keydown', handleEscape, { once: true });
        }
        function handleEscape(e) { if (e.key === 'Escape') closeModal(); }
        window.addEventListener('popstate', (e) => { if (modal.classList.contains('is-open') && (!e.state || e.state.modal !== MODAL_STATE_NAME)) { modal.classList.remove('is-open'); document.body.classList.remove('no-scroll'); document.body.classList.remove('is-modal-open'); modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(0)`; } });
        profileImgContainer.addEventListener('click', openModal);
        
        modal.addEventListener('touchstart', (e) => { if (e.touches.length === MIN_TOUCHES_FOR_PINCH) { e.preventDefault(); modalContent.style.transition = 'none'; initialDistance = getDistance(e.touches); isPinching = true; } else { isPinching = false; } }, { passive: false }); 
        modal.addEventListener('touchmove', (e) => { if (!isPinching) return; e.preventDefault(); const newDistance = getDistance(e.touches); const scaleFactor = newDistance / initialDistance; currentScale = Math.min(Math.max(scaleFactor, 0.5), 4.0); modalContent.style.transform = `scale(${currentScale})`; }, { passive: false }); 
        modal.addEventListener('touchend', (e) => { if (!isPinching) return; isPinching = false; modalContent.style.transition = SPRING_TRANSITION; modalContent.style.transform = `scale(1)`; currentScale = 1; });
        function getDistance(touches) { return Math.sqrt(Math.pow(touches[1].clientX - touches[0].clientX, 2) + Math.pow(touches[1].clientY - touches[0].clientY, 2)); }
    });

    document.addEventListener('touchstart', () => { document.body.classList.add('is-touching'); }, { passive: true });
    document.addEventListener('mousemove', (e) => { if (e.movementX !== 0 || e.movementY !== 0) { document.body.classList.remove('is-touching'); } }, { passive: true });

    const miniIcons = document.querySelectorAll('.social-icons-mini a');
    miniIcons.forEach(icon => {
        icon.addEventListener('mousemove', (e) => {
            if (!document.body.classList.contains('is-touching') && document.body.classList.contains('animations-done')) {
                const rect = icon.getBoundingClientRect(); const x = e.clientX - rect.left - rect.width / 2; const y = e.clientY - rect.top - rect.height / 2;
                icon.style.transform = `translate(${x * 0.4}px, ${y * 0.4}px) scale(1.15)`; icon.style.transition = 'transform 0.1s ease-out';
            }
        });
        icon.addEventListener('mouseleave', () => { icon.style.transform = ''; icon.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; });
    });

    const canvas = document.getElementById('particle-canvas');
    if (canvas) {
        const ctx = canvas.getContext('2d'); let width, height; let particles = []; let tiltX = 0; let tiltY = 0;
        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        class Particle {
            constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 2.0 + 1.0; this.speedX = Math.random() * 0.5 - 0.2; this.speedY = Math.random() * -0.5 - 0.2; this.opacity = Math.random() * 0.35 + 0.15; }
            update() {
                const depth = this.size * 0.4; this.x += this.speedX + (tiltX * 0.02 * depth); this.y += this.speedY + (tiltY * 0.02 * depth);
                if (this.y < -10) this.y = height + 10; if (this.x < -10) this.x = width + 10; if (this.x > width + 10) this.x = -10; if (this.y > height + 10) this.y = -10;
            }
            draw() { ctx.fillStyle = `rgba(157, 80, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 45; i++) { particles.push(new Particle()); }
        function animateParticles() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
        animateParticles();
        window.addEventListener('deviceorientation', (e) => { if(e.gamma !== null && e.beta !== null) { tiltX = e.gamma; tiltY = e.beta; } }, { passive: true });
    }

    const audioPlayer = document.getElementById('audio-player'); const toggleBtn = document.getElementById('music-toggle');
    const defaultCover = document.getElementById('default-cover'); const trackTitle = document.getElementById('track-title'); const trackArtist = document.getElementById('track-artist');
    const trackCover1 = document.getElementById('track-cover-1'); const trackCover2 = document.getElementById('track-cover-2'); let activeCover = 1;
    const playIcon = document.getElementById('play-icon'); const pauseIcon = document.getElementById('pause-icon'); const waveIcon = document.getElementById('wave-icon');
    const musicPill = document.querySelector('.music-pill'); 
    
    const lyricBtn = document.getElementById('lyric-btn');
    const lyricsContainer = document.getElementById('lyrics-container');
    const lyricsWrapper = document.getElementById('lyrics-wrapper');
    
    let isLyricsMode = false;
    let currentLyrics = [];
    let activeLyricIndex = -1;

    let isPlaying = false; let isFirstPlay = true; let pillTimeout; let iconTimeout; let clickTimer; 
    let shuffledQueue = []; let currentQueueIndex = 0; let pillCloseTimer; let trackLoadTicket = 0; let lyricFetchTicket = 0;

    let pressTimer; let isLongPress = false; let isSeeking = false;
    let advancedControlsTimer; let advCloseTimer; let shouldReopenAdvanced = false; 
    let cachedDuration = 0; 

    const seekPill = document.getElementById('seek-pill'); const prevBtn = document.getElementById('prev-btn'); const seekBar = document.getElementById('seek-bar');
    const currentTimeDisplay = document.getElementById('current-time'); const totalTimeDisplay = document.getElementById('total-time');

    let animationFrameId;
    let isUserDraggingLyric = false;
    let lyricStartY = 0;
    let initialTransformY = 0;

    audioPlayer.addEventListener('loadedmetadata', () => {
        if (!isNaN(audioPlayer.duration) && audioPlayer.duration !== Infinity) {
            cachedDuration = audioPlayer.duration;
            totalTimeDisplay.textContent = formatTime(cachedDuration);
        }
        currentTimeDisplay.textContent = "00:00";
        seekBar.value = 0;
        seekBar.style.background = `linear-gradient(to right, var(--ui-light) 0%, rgba(255,255,255,0.15) 0%)`;
    });

    function updateThemeColor(imgUrl) {
        const colorImg = new Image();
        colorImg.crossOrigin = "Anonymous";
        colorImg.src = imgUrl;
        colorImg.onload = () => {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 50; canvas.height = 50;
                ctx.drawImage(colorImg, 0, 0, 50, 50);
                const data = ctx.getImageData(0, 0, 50, 50).data;
                let r=0, g=0, b=0, count=0;
                for(let i=0; i<data.length; i+=16) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++; }
                r=Math.floor(r/count); g=Math.floor(g/count); b=Math.floor(b/count);
                const max = Math.max(r, g, b);
                if (max > 0 && max < 200) { const factor = 200 / max; r = Math.min(255, Math.floor(r * factor)); g = Math.min(255, Math.floor(g * factor)); b = Math.min(255, Math.floor(b * factor)); } 
                else if (max === 0) { r = 220; g = 186; b = 247; }
                document.documentElement.style.setProperty('--lyric-accent', `rgb(${r}, ${g}, ${b})`);
            } catch(e) { document.documentElement.style.setProperty('--lyric-accent', '#DCBAF7'); }
        };
    }

    function updateSeekBarSmoothly() {
        const d = cachedDuration || audioPlayer.duration;
        if (!isSeeking && d && !isNaN(d) && d !== Infinity) {
            const progress = (audioPlayer.currentTime / d) * 100;
            seekBar.value = progress; 
            seekBar.style.background = `linear-gradient(to right, var(--ui-light) ${progress}%, rgba(255,255,255,0.15) ${progress}%)`;
        }
        
        if (isLyricsMode && currentLyrics.length > 0 && !isNaN(audioPlayer.currentTime) && !isUserDraggingLyric) {
            const currentTime = audioPlayer.currentTime;
            let newIndex = -1;

            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentTime >= currentLyrics[i].time - 0.3) { newIndex = i; } else { break; }
            }
            
            if (newIndex !== activeLyricIndex) {
                document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active', 'prev', 'next'));
                activeLyricIndex = newIndex;
                
                if (activeLyricIndex >= 0) {
                    const activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
                    if (activeEl) {
                        activeEl.classList.add('active');
                        if(activeLyricIndex > 0) document.getElementById(`lyric-${activeLyricIndex - 1}`)?.classList.add('prev');
                        if(activeLyricIndex < currentLyrics.length - 1) document.getElementById(`lyric-${activeLyricIndex + 1}`)?.classList.add('next');

                        const offset = activeEl.offsetTop - (lyricsContainer.clientHeight / 2) + (activeEl.clientHeight / 2);
                        lyricsWrapper.style.transform = `translateY(-${offset}px)`;
                    }
                } else {
                    const firstLine = document.getElementById('lyric-0');
                    if (firstLine) firstLine.classList.add('next');
                    lyricsWrapper.style.transform = `translateY(0px)`;
                }
            }
        }
        
        animationFrameId = requestAnimationFrame(updateSeekBarSmoothly);
    }

    animationFrameId = requestAnimationFrame(updateSeekBarSmoothly);

    audioPlayer.addEventListener('seeked', () => {
        activeLyricIndex = -99; 
    });

    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const min = Math.floor(seconds / 60); const sec = Math.floor(seconds % 60);
        return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function closeAdvancedControls(forceHideSeekbarOnly = false) {
        if (isLyricsMode) {
            if (forceHideSeekbarOnly) {
                seekPill.classList.remove('show-seek');
            }
            clearTimeout(advancedControlsTimer); 
            clearTimeout(advCloseTimer);
            return;

                } else { openAdvancedControls(); }

        }, 300);

    async function loadRandomTrack() {
        toggleBtn.classList.add('solid-bg'); 
        trackLoadTicket++; 
        const myTicket = trackLoadTicket;

        currentLyrics = [];
        activeLyricIndex = -1;

        if (shuffledQueue.length === 0 || currentQueueIndex >= shuffledQueue.length) {
            shuffledQueue = Array.from({length: playlist.length}, (_, i) => i);
            for (let i = shuffledQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQueue[i], shuffledQueue[j]] = [shuffledQueue[j], shuffledQueue[i]];
            }
            currentQueueIndex = 0;
        }

        const trackIndex = shuffledQueue[currentQueueIndex]; 
        currentQueueIndex++; 
        const randomTrack = playlist[trackIndex];
        
        trackTitle.textContent = randomTrack.title; 
        trackArtist.textContent = randomTrack.artist; 
        audioPlayer.src = randomTrack.file; 
        cachedDuration = 0; 
        
        fetchLyrics(randomTrack.file);

        const fileName = randomTrack.file.split('/').pop().replace('.opus', '.png');
        const finalCoverUrl = `https://kazikate.github.io/Biography/assets/covers/${fileName}`;
        const defaultCoverUrl = "https://i.scdn.co/image/ab67616d0000b27341e97ee9cf2ee378519e4875";

        if (myTicket !== trackLoadTicket) return;

        const nextCover = activeCover === 1 ? trackCover2 : trackCover1; 
        const currentCover = activeCover === 1 ? trackCover1 : trackCover2;

        updateThemeColor(finalCoverUrl);

        const preloader = new Image();
        preloader.onload = () => {
            if (myTicket !== trackLoadTicket) return; 
            nextCover.src = finalCoverUrl; 
            nextCover.style.opacity = '1'; 
            currentCover.style.opacity = '0'; 
            defaultCover.style.opacity = '0'; 
            activeCover = activeCover === 1 ? 2 : 1; 
            
            if (isLyricsMode && profileImgVisual) {
                profileImgVisual.style.backgroundImage = `url("${finalCoverUrl}")`;
            }
        };
        
        preloader.onerror = () => {
            if (myTicket !== trackLoadTicket) return; 
            console.log("Kapak klasörde bulunamadı: ", fileName);
            nextCover.src = defaultCoverUrl; 
            nextCover.style.opacity = '1'; 
            currentCover.style.opacity = '0'; 
            defaultCover.style.opacity = '0'; 
            activeCover = activeCover === 1 ? 2 : 1; 

            if (isLyricsMode && profileImgVisual) {
                profileImgVisual.style.backgroundImage = `url("${defaultCoverUrl}")`;
            }
        };
        preloader.src = finalCoverUrl; 
    }

    function parseLRC(lrcText) {
        const lines = lrcText.split('\n');
        const parsed = [];
        const timeRegEx = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        
        lines.forEach(line => {
            const match = line.match(timeRegEx);
            if (match) {
                const minutes = parseInt(match[1]);
                const seconds = parseInt(match[2]);
                const milliseconds = match[3].length === 2 ? parseInt(match[3]) * 10 : parseInt(match[3]);
                const time = (minutes * 60) + seconds + (milliseconds / 1000);
                
                let text = line.replace(timeRegEx, '').trim();
                if (text === '' || text === '♪' || text === '♫') text = '•••'; 
                parsed.push({ time, text });
            }
        });

        const processedLyrics = [];
        for (let i = 0; i < parsed.length; i++) {
            processedLyrics.push(parsed[i]);
            if (i < parsed.length - 1) {
                const gap = parsed[i+1].time - parsed[i].time;
                if (gap > 8 && parsed[i].text !== '•••') {
                    processedLyrics.push({ time: parsed[i].time + 2, text: '•••' });
                }
            }
        }
        if (processedLyrics.length > 0 && processedLyrics[0].time > 5) {
            processedLyrics.unshift({ time: 0, text: '•••' });
        }
        return processedLyrics;
    }

    async function fetchLyrics(fileUrl) {
        lyricFetchTicket++;
        const myTicket = lyricFetchTicket;
        
        lyricsWrapper.innerHTML = '<div class="lyric-line">Loading...</div>';
        currentLyrics = []; activeLyricIndex = -1; lyricsWrapper.style.transform = `translateY(0px)`;
        
        try {
            const fileName = fileUrl.split('/').pop().replace('.opus', '.lrc');
            const lrcUrl = `https://kazikate.github.io/Biography/music/lyric/${fileName}`;
            
            const res = await fetch(lrcUrl);
            if (res.ok) {
                const lrcText = await res.text();
                
                if (myTicket === lyricFetchTicket) {
                    currentLyrics = parseLRC(lrcText);
                    currentLyrics.sort((a, b) => a.time - b.time);
                    
                    lyricsWrapper.innerHTML = '';
                    currentLyrics.forEach((line, index) => {
                        const el = document.createElement('div');
                        el.className = 'lyric-line';
                        el.id = `lyric-${index}`.trim(); 
                        if (line.text === '•••') {
                            el.innerHTML = '<span class="lyric-dot"></span><span class="lyric-dot"></span><span class="lyric-dot"></span>';
                            el.classList.add('instrumental');
                        } else { 
                            el.innerText = line.text; 
                        }
                        lyricsWrapper.appendChild(el);
                    });
                    
                    activeLyricIndex = -99;
                    return;
                }
            } else {
                if (myTicket === lyricFetchTicket) lyricsWrapper.innerHTML = '<div class="lyric-line">Sözler klasörde bulunamadı.</div>';
            }
        } catch (err) {
            if (myTicket === lyricFetchTicket) lyricsWrapper.innerHTML = '<div class="lyric-line">Bağlantı hatası.</div>';
        }
    }

    function toggleLyrics() {
        if (navigator.vibrate) navigator.vibrate(20);
        isLyricsMode = !isLyricsMode;
        
        if (isLyricsMode) {
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
            lyricBtn.classList.add('is-active');
            lyricsContainer.classList.add('show-lyrics');
            
            // LİRİK TEMASINI DEVREYE SOK
            document.body.classList.add('theme-lyric-on');
            
                        const activeCoverSrc = activeCover === 1 ? trackCover1.src : trackCover2.src;
            if (profileImgVisual) {
                profileImgVisual.style.backgroundImage = `url("${activeCoverSrc}")`;
                profileImgVisual.style.filter = 'blur(20px) brightness(0.3)';
                profileImgVisual.style.transform = 'scale(1.1)';
            }
            
            // TRAFİK POLİSİ: Şarkı ismi ekranda DEĞİLSE seekbar'ı aç
            if (!musicPill.classList.contains('show-pill')) {
                seekPill.classList.add('show-seek');
            }
            
            prevBtn.classList.add('show-prev');
            lyricBtn.classList.add('show-prev');
            clearTimeout(advancedControlsTimer);

            // SLOT MAKİNESİ EFEKTİ (Yumuşatılmış Frenli)
            const currentTransform = window.getComputedStyle(lyricsWrapper).getPropertyValue('transform');
            let currentY = 0;
            if (currentTransform !== 'none') { currentY = parseFloat(currentTransform.split(',')[5]); }
            lyricsWrapper.style.transition = 'none'; 
            lyricsWrapper.style.transform = `translateY(${currentY + 120}px)`; 
            void lyricsWrapper.offsetWidth; 
            lyricsWrapper.style.transition = 'transform 0.7s cubic-bezier(0.25, 1.5, 0.5, 1)'; 
            
            activeLyricIndex = -99;
            
            if (currentLyrics.length === 0 && document.getElementById('track-title').innerText !== "Bekleniyor...") {
                fetchLyrics(audioPlayer.src);
            }

        } else {
            lyricBtn.classList.remove('is-active');
            lyricsContainer.classList.remove('show-lyrics');
            
            // LİRİK TEMASINDAN ÇIK (Kendi rengine dön)
            document.body.classList.remove('theme-lyric-on');
            
            if (profileImgVisual) {
                profileImgVisual.style.backgroundImage = `url('https://kazikate.github.io/Biography/assets/Profile2.png')`;
                profileImgVisual.style.filter = ''; profileImgVisual.style.transform = '';
                window.dispatchEvent(new Event('scroll'));
            }
            resetAdvancedControlsTimer(); 
        }
    }

    lyricBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLyrics(); });

    lyricsContainer.addEventListener('touchstart', (e) => {
        if (!isLyricsMode || currentLyrics.length === 0 || e.touches.length > 1) return;
        isUserDraggingLyric = true;
        lyricStartY = e.touches[0].clientY;
        const transform = window.getComputedStyle(lyricsWrapper).getPropertyValue('transform');
        initialTransformY = transform !== 'none' ? parseFloat(transform.split(',')[5]) : 0;
        lyricsWrapper.style.transition = 'none';
        document.querySelectorAll('.lyric-line').forEach(el => el.style.transition = 'color 0.2s, transform 0.2s, filter 0.2s, opacity 0.2s');
    }, { passive: false });

    lyricsContainer.addEventListener('touchmove', (e) => {
        if (!isUserDraggingLyric) return;
        e.preventDefault(); 
        
        const deltaY = e.touches[0].clientY - lyricStartY;
        const newY = initialTransformY + deltaY;
        lyricsWrapper.style.transform = `translateY(${newY}px)`;

        const containerCenter = lyricsContainer.clientHeight / 2;
        let closestIndex = -1; let minDistance = Infinity;

        const lines = document.querySelectorAll('.lyric-line');
        lines.forEach((el, index) => {
            const elCenter = el.offsetTop + newY + (el.clientHeight / 2);
            const dist = Math.abs(containerCenter - elCenter);
            if (dist < minDistance) { minDistance = dist; closestIndex = index; }
        });

        if (closestIndex !== -1 && closestIndex !== activeLyricIndex) {
            activeLyricIndex = closestIndex;
            lines.forEach(el => el.classList.remove('active', 'prev', 'next'));
            const activeEl = document.getElementById(`lyric-${closestIndex}`);
            if (activeEl) {
                if (navigator.vibrate) navigator.vibrate(10); 
                activeEl.classList.add('active');
                if(closestIndex > 0) document.getElementById(`lyric-${closestIndex - 1}`)?.classList.add('prev');
                if(closestIndex < currentLyrics.length - 1) document.getElementById(`lyric-${closestIndex + 1}`)?.classList.add('next');
            }
        }
    }, { passive: false });

    lyricsContainer.addEventListener('touchend', () => {
        if (!isUserDraggingLyric) return;
        isUserDraggingLyric = false;
        // PARMAKLA KAYDIRMA SONRASI OTURMA (Yumuşatılmış Frenli)
        lyricsWrapper.style.transition = 'transform 0.6s cubic-bezier(0.25, 1.5, 0.5, 1)';

        document.querySelectorAll('.lyric-line').forEach(el => el.style.transition = '');

        if (activeLyricIndex !== -1 && currentLyrics[activeLyricIndex]) {
            audioPlayer.currentTime = currentLyrics[activeLyricIndex].time;
            if (!isPlaying) playTrack();
        }
    });

    let globalHoldTimer;
    document.addEventListener('pointerdown', (e) => {
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        if (navigator.vibrate) navigator.vibrate(10);
        globalHoldTimer = setTimeout(() => { if (navigator.vibrate) navigator.vibrate(50); }, 300); 
    });
    function stopHaptics() { clearTimeout(globalHoldTimer); if (navigator.vibrate) navigator.vibrate(0); }
    document.addEventListener('pointerup', stopHaptics);
    document.addEventListener('pointercancel', stopHaptics);
    window.addEventListener('scroll', stopHaptics, { passive: true });

</script>

    <div class="bottom-blur-layer"></div>

</body>
</html>
